name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend · lint + test
    runs-on: ubuntu-latest
    env:
      # Tests run generated code locally in a subprocess sandbox; there is no live
      # LLM or MLflow server in CI, so gate exec on and use a file-based tracker.
      ALLOW_LOCAL_EXEC: "true"
      EXECUTION_BACKEND: subprocess
      APP_ENV: development
      MLFLOW_TRACKING_URI: file:./mlruns
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Ruff (lint)
        run: ruff check .
      - name: Pytest (with coverage)
        run: pytest --cov=. --cov-report=term-missing -q

  frontend:
    name: Frontend · typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Build (runs the TypeScript type-check)
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000

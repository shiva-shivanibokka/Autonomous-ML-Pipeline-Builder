# Local development stack: FastAPI backend + MLflow tracking server.
# (Production is Cloud Run for the API + Vercel for the frontend — see deploy/README.md.)
#
#   docker-compose up --build
#   API docs:  http://localhost:8000/docs
#   MLflow UI: http://localhost:5001

services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5001
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    ports:
      - "5001:5001"
    volumes:
      - mlflow_data:/mlflow
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      # Local dev overrides — the image defaults to production, which refuses to
      # boot without a real E2B key and a locked-down CORS allowlist.
      APP_ENV: development
      PORT: "8000"
      EXECUTION_BACKEND: ${EXECUTION_BACKEND:-subprocess}
      ALLOW_LOCAL_EXEC: ${ALLOW_LOCAL_EXEC:-true}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      E2B_API_KEY: ${E2B_API_KEY:-}
      MLFLOW_TRACKING_URI: http://mlflow:5001
    volumes:
      - outputs_data:/app/outputs
      - upload_data:/app/uploads
    depends_on:
      mlflow:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mlflow_data:
  outputs_data:
  upload_data:

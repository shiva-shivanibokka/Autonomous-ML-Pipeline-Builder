# configs/pipeline.yaml — pipeline-level settings

pipeline:
  # Maximum attempts for self-correcting code execution
  max_correction_retries: 3

  # E2B sandbox timeout in seconds
  sandbox_timeout_seconds: 120

  # Whether to use E2B cloud sandbox or subprocess fallback
  # Options: "e2b" | "subprocess"
  execution_backend: e2b

  # Maximum number of models to train in parallel
  max_parallel_models: 5

  # Minimum metric improvement required to declare a winner over baseline
  # (e.g., winner must be at least 2% better than simplest model)
  min_improvement_threshold: 0.02

agents:
  orchestrator:
    # Sonnet for reasoning — uses provider's default reasoning model
    use_codegen_model: false

  data_analyst:
    # Sonnet for preprocessing recommendations
    use_codegen_model: false
    max_categorical_preview: 10
    outlier_iqr_factor: 3.0        # Flag outliers beyond 3*IQR
    high_cardinality_threshold: 50  # Categoricals with > 50 unique values

  feature_engineer:
    # Haiku/mini for code generation — faster and cheaper
    use_codegen_model: true
    max_code_length_chars: 8000

  model_trainer:
    # No LLM needed for training itself
    train_test_split: 0.2
    stratified_split: true          # Use stratified split for classification

  evaluator:
    # Sonnet for justification writing
    use_codegen_model: false
    shap_max_rows: 200             # Limit SHAP computation for speed
    run_bias_check: true

  code_generator:
    # Haiku/mini for code generation
    use_codegen_model: true
    validate_syntax: true           # Run syntax check in sandbox

  deployment_agent:
    # Haiku/mini for boilerplate code generation
    use_codegen_model: true
    generate_openapi: true
    generate_dockerfile: true

mlflow:
  experiment_name: autonomous-ml-pipeline
  # Register models automatically after comparison
  auto_register_winner: true
  # Tracking URI — overridden by MLFLOW_TRACKING_URI env var
  tracking_uri: http://localhost:5001

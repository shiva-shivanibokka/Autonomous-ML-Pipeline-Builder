# configs/models.yaml — model hyperparameter defaults and search spaces
# Used by the Orchestrator Agent when selecting models and by future HPO runs.

classification:
  lightgbm:
    n_estimators: 300
    learning_rate: 0.05
    max_depth: 6
    num_leaves: 31
    subsample: 0.8
    colsample_bytree: 0.8
    min_child_samples: 20
    random_state: 42
    verbose: -1

  xgboost:
    n_estimators: 300
    learning_rate: 0.05
    max_depth: 6
    subsample: 0.8
    colsample_bytree: 0.8
    eval_metric: logloss
    use_label_encoder: false
    random_state: 42
    verbosity: 0

  random_forest:
    n_estimators: 200
    max_depth: 10
    min_samples_leaf: 5
    n_jobs: -1
    random_state: 42

  mlp:
    hidden_layer_sizes: [128, 64]
    max_iter: 300
    early_stopping: true
    random_state: 42

  logistic_regression:
    max_iter: 1000
    random_state: 42

regression:
  lightgbm:
    n_estimators: 300
    learning_rate: 0.05
    max_depth: 6
    num_leaves: 31
    subsample: 0.8
    colsample_bytree: 0.8
    random_state: 42
    verbose: -1

  xgboost:
    n_estimators: 300
    learning_rate: 0.05
    max_depth: 6
    subsample: 0.8
    colsample_bytree: 0.8
    random_state: 42
    verbosity: 0

  random_forest:
    n_estimators: 200
    max_depth: 10
    min_samples_leaf: 5
    n_jobs: -1
    random_state: 42

  mlp:
    hidden_layer_sizes: [128, 64]
    max_iter: 300
    early_stopping: true
    random_state: 42

  linear_regression:
    alpha: 1.0  # Ridge regularization

# Evaluation metrics per task type
metrics:
  classification:
    primary: auc
    secondary: [f1, precision, recall, accuracy]
  regression:
    primary: rmse
    secondary: [r2, mape]
  time_series:
    primary: mape
    secondary: [rmse, r2]

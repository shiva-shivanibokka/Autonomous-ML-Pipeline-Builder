target-version = "py311"
line-length = 100
extend-exclude = ["web", "mlruns", "outputs", "uploads"]

[lint]
# Pyflakes (F) catches real bugs (undefined names, unused imports); pycodestyle (E)
# and isort (I) keep style consistent. Line-length is enforced by the formatter, not
# the linter, so E501 is off.
select = ["E", "F", "I"]
ignore = ["E501"]
